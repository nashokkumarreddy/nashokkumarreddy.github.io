<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore the technical GitHub projects and repositories of Ashok Kumar Reddy, focusing on Embedded Systems and IoT.">
    <title>GitHub Projects - Ashok Kumar Reddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.02);
        }
        /* Loader */
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-600 font-sans antialiased selection:bg-blue-500/20">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 top-0 transition-all duration-300 bg-white/80 backdrop-blur-md border-b border-slate-200/60 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0">
                    <a href="index.html" class="flex items-center gap-3 group">
                        <div class="w-10 h-10 flex items-center justify-center rounded-full bg-blue-100 text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                            <i data-lucide="arrow-left" class="w-5 h-5"></i>
                        </div>
                        <span class="text-xl font-bold tracking-tight text-slate-900 group-hover:text-blue-600 transition-colors">Back to Portfolio</span>
                    </a>
                </div>
                <!-- GitHub Link -->
                <div class="flex items-center">
                    <a href="https://github.com/nashokkumarreddy" target="_blank" class="flex items-center gap-2 text-slate-600 hover:text-slate-900 font-semibold bg-white border border-slate-200 shadow-sm hover:shadow-md px-4 py-2 rounded-xl transition-all">
                        <i data-lucide="github" class="w-5 h-5"></i>
                        <span>@nashokkumarreddy</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="pt-36 pb-16 relative z-10 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight mb-4">My <span class="text-blue-600">GitHub</span> Projects</h1>
        <p class="text-lg text-slate-600 max-w-2xl mx-auto px-4">These repositories are automatically fetched live from my GitHub profile. Feel free to explore the code!</p>
    </div>

    <!-- Projects Grid -->
    <section class="pb-24 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto min-h-[50vh]">
        <!-- Loading Spinner -->
        <div id="loader" class="flex flex-col justify-center items-center py-20">
            <div class="w-12 h-12 border-4 border-slate-200 rounded-full loader mb-4"></div>
            <p class="text-slate-500 font-medium">Fetching repositories from GitHub...</p>
        </div>
        
        <div id="projects-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
            <!-- Projects will be injected here -->
        </div>
        
        <div id="error-message" class="hidden text-center text-red-500 py-10">
            Failed to load projects. Please try again later.
        </div>
    </section>

    <!-- Footer -->
    <footer class="border-t border-slate-200 bg-white pt-12 pb-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col items-center">
            <p class="text-slate-500 text-sm font-medium">
                &copy; 2026 Ashok Kumar Reddy. All rights reserved.
            </p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('projects-grid');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('error-message');
            
            try {
                // Fetch public repositories for the user
                const response = await fetch('https://api.github.com/users/nashokkumarreddy/repos?sort=updated&per_page=100');
                if (!response.ok) throw new Error('Failed to fetch');
                
                const repos = await response.json();
                
                if (repos.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center text-slate-500">No public repositories found.</p>';
                } else {
                    // Filter out forks if preferred
                    const filteredRepos = repos.filter(repo => !repo.fork);
                    
                    filteredRepos.forEach(repo => {
                        const card = document.createElement('div');
                        card.className = 'glass-card rounded-3xl p-8 transition-all duration-300 hover:shadow-xl hover:-translate-y-2 flex flex-col h-full border border-slate-200/60';
                        
                        // Pick styling based on language
                        let icon = 'github';
                        let bgColor = 'bg-slate-50';
                        let textColor = 'text-slate-600';
                        
                        if (repo.language === 'Verilog') {
                            icon = 'cpu';
                            bgColor = 'bg-indigo-50';
                            textColor = 'text-indigo-600';
                        } else if (repo.language === 'C++' || repo.language === 'C') {
                            icon = 'terminal';
                            bgColor = 'bg-blue-50';
                            textColor = 'text-blue-600';
                        } else if (repo.language) {
                            icon = 'code';
                            bgColor = 'bg-teal-50';
                            textColor = 'text-teal-600';
                        }

                        // Format repo name to be more readable
                        const readableName = repo.name.replace(/[-_]/g, ' ');

                        card.innerHTML = `
                            <div class="w-14 h-14 ${bgColor} ${textColor} rounded-2xl flex items-center justify-center mb-6 shadow-sm">
                                <i data-lucide="${icon}" class="w-7 h-7"></i>
                            </div>
                            <h3 class="text-xl font-bold text-slate-900 mb-3 leading-tight capitalize">${readableName}</h3>
                            <p class="text-slate-600 mb-6 flex-grow leading-relaxed text-sm">${repo.description || 'No description available for this repository.'}</p>
                            
                            <div class="flex items-center justify-between mt-auto pt-6 border-t border-slate-100">
                                <span class="text-xs font-bold px-3 py-1 bg-slate-100 text-slate-600 rounded-full">${repo.language || 'Code'}</span>
                                <a href="${repo.html_url}" target="_blank" class="text-blue-600 hover:text-blue-700 font-semibold flex items-center group text-sm">
                                    View Source <i data-lucide="arrow-up-right" class="w-4 h-4 ml-1 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform"></i>
                                </a>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
                
                // Hide loader and show grid
                loader.classList.add('hidden');
                grid.classList.remove('hidden');
                
                // Re-initialize icons for newly added elements
                lucide.createIcons();
                
            } catch (error) {
                console.error('Error loading projects:', error);
                loader.classList.add('hidden');
                errorMessage.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
